name: Main Workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
jobs:
  build-remote:
    runs-on: ubuntu-latest-4-cores
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET tools
        run: dotnet tool restore

      - name: Check Formatting
        run: dotnet csharpier --check .

      - name: Install dependencies
        run: dotnet restore

      - name: Disable embedded mode
        run: sudo bash disable_embedded_mode.sh

      - name: Build
        run: dotnet build --no-restore

  build:
    needs: [embedded-build]
    runs-on: ubuntu-latest-4-cores
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download embedded artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: embedded
          path: ./rust-embedded/target/debug

      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET tools
        run: dotnet tool restore

      - name: Check Formatting
        run: |
          export PATH
          dotnet csharpier --check .

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

  test:
    needs: [embedded-build]
    runs-on: ubuntu-latest-4-cores
    strategy:
      matrix:
        surrealdb_version:
          [
            "v1.5.6",
            "v2.0.5",
            "v2.1.9",
            "v2.2.8",
            "v2.3.10",
            "v2.4.0",
            "v2.6.1",
            "v3.0.5",
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download embedded artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: embedded
          path: ./rust-embedded/target/debug

      - name: Download SurrealDB
        run: curl --proto '=https' --tlsv1.2 -sSf https://install.surrealdb.com | sh -s -- --version ${{ matrix.surrealdb_version }}

      - name: Run SurrealDB root
        run: |
          if [ "${{ matrix.surrealdb_version }}" == "v1.5.6" ]; then
            surreal start --user root --pass root memory --auth --allow-guests &
          else
            surreal start --user root --pass root memory --allow-guests &
          fi

      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test library
        working-directory: SurrealDb.Net.Tests
        run: >
          dotnet run
          --project SurrealDb.Net.Tests.csproj
          --no-restore
          --coverage
          --coverage-output-format cobertura

      - name: Test Live Query feature
        working-directory: SurrealDb.Net.LiveQuery.Tests
        run: >
          dotnet run
          --project SurrealDb.Net.LiveQuery.Tests.csproj
          --no-restore
          --coverage
          --coverage-output-format cobertura

      - name: Upload Coverage
        if: matrix.surrealdb_version == 'v2.4.0'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          fail_ci_if_error: false
          files: "**/*.cobertura.xml"
          token: ${{ secrets.CODECOV_TOKEN }}

  embedded-build:
    runs-on: ubuntu-latest-4-cores
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          sparse-checkout: |
            rust-embedded

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          components: cargo, clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build libraries
        working-directory: ./rust-embedded
        run: cargo build

      - name: Publish embedded artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: embedded
          path: |
            ./rust-embedded/target/debug/libsurreal_memory.so
            ./rust-embedded/target/debug/libsurreal_rocksdb.so
            ./rust-embedded/target/debug/libsurreal_surrealkv.so

  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          sparse-checkout: |
            rust-embedded

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.94.0
          components: cargo, clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run check
        working-directory: ./rust-embedded
        run: cargo check --all

      - name: Run tests
        working-directory: ./rust-embedded
        run: cargo test

      - name: Run format
        working-directory: ./rust-embedded
        run: |
          cargo check --all
          cargo fix --allow-no-vcs

      - name: Run lint
        working-directory: ./rust-embedded
        run: cargo clippy -- -Dwarnings

