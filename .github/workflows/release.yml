name: Release Workflow

on:
  release:
    types: [created]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace }}/nuget

defaults:
  run:
    shell: pwsh

jobs:
  embedded-builds:
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            libpath: |
              **/release/surreal_memory.dll
              **/release/surreal_memory.pdb
              **/release/surreal_rocksdb.dll
              **/release/surreal_rocksdb.pdb
              **/release/surreal_surrealkv.dll
              **/release/surreal_surrealkv.pdb
            continue-on-error: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            libpath: |
              **/release/libsurreal_memory.so
              **/release/libsurreal_rocksdb.so
              **/release/libsurreal_surrealkv.so
            continue-on-error: false
          # 💡 not supported by the toolchain
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-musl
          #   libpath: |
          #     **/release/libsurreal_memory.so
          #     **/release/libsurreal_rocksdb.so
          #     **/release/libsurreal_surrealkv.so
          # 💡 not supported by the toolchain
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-musl
          #   libpath: |
          #     **/release/libsurreal_memory.so
          #     **/release/libsurreal_rocksdb.so
          #     **/release/libsurreal_surrealkv.so
          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            libpath: |
              **/release/libsurreal_memory.so
              **/release/libsurreal_rocksdb.so
              **/release/libsurreal_surrealkv.so
            continue-on-error: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            libpath: |
              **/release/libsurreal_memory.so
              **/release/libsurreal_rocksdb.so
              **/release/libsurreal_surrealkv.so
            continue-on-error: true
          - os: ubuntu-latest
            target: aarch64-linux-android
            libpath: |
              **/release/libsurreal_memory.so
              **/release/libsurreal_rocksdb.so
              **/release/libsurreal_surrealkv.so
            continue-on-error: false
          - os: macos-latest
            target: x86_64-apple-darwin
            libpath: |
              **/release/libsurreal_memory.dylib
              **/release/libsurreal_rocksdb.dylib
              **/release/libsurreal_surrealkv.dylib
            continue-on-error: false
          - os: macos-latest
            target: aarch64-apple-darwin
            libpath: |
              **/release/libsurreal_memory.dylib
              **/release/libsurreal_rocksdb.dylib
              **/release/libsurreal_surrealkv.dylib
            continue-on-error: false
          - os: macos-latest
            target: aarch64-apple-ios
            libpath: |
              **/release/libsurreal_memory.dylib
              **/release/libsurreal_rocksdb.dylib
              **/release/libsurreal_surrealkv.dylib
            continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          sparse-checkout: |
            rust-embedded

      - name: Install gcc-aarch64-linux-gnu
        run: sudo apt-get install gcc-aarch64-linux-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        id: setup-ndk
        with:
          ndk-version: r26d
        if: matrix.target == 'aarch64-linux-android'

      - name: Set Android linker for Rust target
        run: echo "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/" >> $GITHUB_PATH
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        if: matrix.target == 'aarch64-linux-android'

      - name: Install g++-arm-linux-gnueabihf
        run: sudo apt-get install g++-arm-linux-gnueabihf
        if: matrix.target == 'arm-unknown-linux-gnueabihf'

      - name: Set IPHONEOS_DEPLOYMENT_TARGET env variable
        run: echo "IPHONEOS_DEPLOYMENT_TARGET=10.0" >> $GITHUB_ENV
        shell: bash
        if: matrix.target == 'aarch64-apple-ios'

      - name: Set CARGO_FEATURE_NO_NEON env variable
        run: echo "CARGO_FEATURE_NO_NEON=1" >> $GITHUB_ENV
        shell: bash
        if: matrix.target == 'aarch64-apple-ios'

      - name: Install 1.91.0 toolchain
        uses: dtolnay/rust-toolchain@0dd4a6d07aedb0ef7f65e79f3e229a6c102ae2e0 # 1.91.0
        with:
          toolchain: 1.91.0 # must match the version in the `rust-embedded/rust-toolchain` file
          target: ${{ matrix.target }}

      - name: Build "memory" library
        working-directory: ./rust-embedded/memory
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build "rocksdb" library
        working-directory: ./rust-embedded/rocksdb
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build "surrealkv" library
        working-directory: ./rust-embedded/surrealkv
        run: cargo build --release --target ${{ matrix.target }}

      - name: Publish embedded artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: embedded-${{ matrix.target }}
          path: ${{ matrix.libpath }}

  create-package:
    needs: [embedded-builds]
    if: always()
    runs-on: ubuntu-latest-4-cores

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download embedded artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        if: github.event_name == 'release'
        with:
          pattern: embedded-*
          merge-multiple: true

      - name: Compute pre-release version suffix (PR only)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "VERSION_SUFFIX=pr${PR_NUMBER}-${TIMESTAMP}" >> $GITHUB_ENV

      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Create Package (release)
        if: github.event_name == 'release'
        run: dotnet pack /p:GenerateCompatibilitySuppressionFile=true --configuration Release --output ${{ env.NuGetDirectory }}

      - name: Disable embedded mode (PR pre-release)
        if: github.event_name == 'pull_request'
        run: sudo bash disable_embedded_mode.sh

      - name: Create Package (PR pre-release)
        if: github.event_name == 'pull_request'
        run: dotnet pack /p:GenerateCompatibilitySuppressionFile=true --configuration Release --output ${{ env.NuGetDirectory }} --version-suffix "${{ env.VERSION_SUFFIX }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*.nupkg

  validate-package:
    needs: [create-package]
    if: always() && needs.create-package.result == 'success'
    runs-on: ubuntu-latest-4-cores

    steps:
      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Install NuGet Package Validation Tool
        run: dotnet tool update Meziantou.Framework.NuGetPackageValidation.Tool --global

      - name: Validate package
        run: meziantou.validate-nuget-package (Get-ChildItem "${{ env.NuGetDirectory }}/*.nupkg")

  publish-package:
    if: github.event_name == 'release'
    needs: [validate-package]
    runs-on: ubuntu-latest

    steps:
      - name: Setup dotnet 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Publish NuGet package
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              dotnet nuget push $file --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

  publish-dev-artifacts:
    if: always() && github.event_name == 'pull_request' && needs.validate-package.result == 'success'
    needs: [validate-package]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Upload dev packages as PR artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-pr${{ github.event.pull_request.number }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ env.NuGetDirectory }}/*.nupkg
